name: Build

# Собирает .cs3 и plugins.json и публикует их в ветку `builds`.
# URL для установки в CloudStream (Add repository):
#   https://raw.githubusercontent.com/TheRainOfSoul/arm-tv/builds/plugins.json
# Основан на официальном workflow recloudstream/extensions, версии actions обновлены.

concurrency:
  group: "build"
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '*.md'

# GITHUB_TOKEN должен иметь право force-push в ветку builds.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          path: "src"

      - name: Checkout builds branch
        uses: actions/checkout@v4
        with:
          ref: "builds"
          path: "builds"

      - name: Clean old builds
        run: |
          rm "$GITHUB_WORKSPACE"/builds/*.cs3 || true
          rm "$GITHUB_WORKSPACE"/builds/*.jar || true

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build plugins
        run: |
          shopt -s globstar
          cd "$GITHUB_WORKSPACE/src"
          chmod +x gradlew
          ./gradlew make makePluginsJson
          ./gradlew ensureJarCompatibility
          # Обязательные артефакты
          cp **/build/*.cs3 "$GITHUB_WORKSPACE/builds/"
          cp build/plugins.json "$GITHUB_WORKSPACE/builds/"
          # Дескриптор репозитория — именно его URL добавляют в CloudStream (Add repository)
          cp repo.json "$GITHUB_WORKSPACE/builds/"
          # jar для CloudStream не требуется — копируем, только если он есть
          cp **/build/*.jar "$GITHUB_WORKSPACE/builds/" 2>/dev/null || true

      - name: Push to builds branch
        run: |
          cd "$GITHUB_WORKSPACE/builds"
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions"
          git add .
          # Держим builds одним постоянно перезаписываемым коммитом (без разрастания истории от бинарников).
          git commit --amend -m "Build $GITHUB_SHA" || exit 0
          git push --force
